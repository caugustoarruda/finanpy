{% extends "base_app.html" %}

{% block title %}Excluir conta | Finanpy{% endblock %}

{% block content %}
<div class="mx-auto flex max-w-md flex-col gap-6">
  <div>
    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Excluir conta</h1>
    <p class="text-sm text-slate-500 mt-1">Esta ação não pode ser desfeita.</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
    <p class="text-sm text-slate-600">
      Tem certeza que deseja excluir a conta "<span class="font-medium text-slate-800">{{ object.name }}</span>"?
    </p>

    <form method="post" class="mt-6 flex justify-end gap-3">
      {% csrf_token %}
      <a
        href="{% url 'accounts:list' %}"
        class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 font-medium px-4 py-2 rounded-lg transition-colors duration-200"
      >Cancelar</a>
      <button
        type="submit"
        class="bg-rose-600 hover:bg-rose-700 text-white font-medium px-4 py-2 rounded-lg transition-colors duration-200"
      >Excluir</button>
    </form>
  </div>
</div>
{% endblock %}
