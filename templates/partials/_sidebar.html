<aside
  :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
  class="fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-white border-r border-slate-200 transform transition-transform duration-200 ease-in-out md:translate-x-0"
>
  <div class="flex items-center justify-between p-6 bg-gradient-to-r from-indigo-600 to-purple-600">
    <span class="text-white text-xl font-bold">Finanpy</span>
    <button
      type="button"
      class="md:hidden rounded-lg p-1 text-white/90 hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white"
      @click="sidebarOpen = false"
      aria-label="Fechar menu"
    >
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <nav class="flex-1 space-y-1 p-4">
    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-700 hover:bg-slate-100 transition-colors duration-200">Dashboard</a>
    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-700 hover:bg-slate-100 transition-colors duration-200">Contas</a>
    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-700 hover:bg-slate-100 transition-colors duration-200">Categorias</a>
    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-700 hover:bg-slate-100 transition-colors duration-200">Transações</a>
    <a
      href="{% url 'profiles:detail' %}"
      class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors duration-200
        {% if request.resolver_match.app_name == 'profiles' and request.resolver_match.url_name == 'detail' %}bg-indigo-50 text-indigo-700 font-medium{% else %}text-slate-700 hover:bg-slate-100{% endif %}"
      {% if request.resolver_match.app_name == 'profiles' and request.resolver_match.url_name == 'detail' %}aria-current="page"{% endif %}
    >Perfil</a>
  </nav>
  <div class="border-t border-slate-200 p-4">
    <form method="post" action="{% url 'users:logout' %}">
      {% csrf_token %}
      <button type="submit" class="flex w-full items-center gap-3 px-3 py-2 rounded-lg text-rose-600 hover:bg-rose-50 transition-colors duration-200">Sair</button>
    </form>
  </div>
</aside>

<div
  x-show="sidebarOpen"
  x-cloak
  x-transition.opacity
  class="fixed inset-0 z-30 bg-slate-900/50 md:hidden"
  @click="sidebarOpen = false"
  aria-hidden="true"
></div>
