{% if messages %}
<div class="mb-4 space-y-2">
  {% for message in messages %}
  <div
    x-data="{ show: true }"
    x-show="show"
    x-transition.opacity
    class="flex items-start justify-between gap-3 rounded-lg border p-4 text-sm
      {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-600
      {% elif message.tags == 'error' %}bg-rose-50 border-rose-200 text-rose-600
      {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-600
      {% else %}bg-indigo-50 border-indigo-200 text-indigo-700{% endif %}"
    role="alert"
  >
    <p class="font-medium">{{ message }}</p>
    <button
      type="button"
      class="shrink-0 rounded-md p-1 opacity-70 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-current"
      @click="show = false"
      aria-label="Fechar mensagem"
    >
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
